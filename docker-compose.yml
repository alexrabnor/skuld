services:
  skuld:
    build:
      context: .
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: always
    env_file:
      - .env.local
    ports:
      - "3005:3000"
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true

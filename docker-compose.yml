services:
  skuld:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=${PORT}
      - HOSTNAME=0.0.0.0
      - PLAN_DATA_DIR=/app/data
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - skuld_data:/app/data
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true

volumes:
  skuld_data:
